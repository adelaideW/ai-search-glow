<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Search Glow — All Versions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 20px;
      /* Same mood as v5 search field: cool lavender → warm peach wash */
      background:
        radial-gradient(ellipse 100% 70% at 50% -5%, rgba(79, 110, 247, 0.14), transparent 58%),
        linear-gradient(165deg, #e4e2ff 0%, #f0ecfa 38%, #faf2f5 72%, #fff2eb 100%);
      color: #333;
    }

    .intro {
      text-align: center;
      max-width: 420px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #4f6ef7;
      letter-spacing: -0.02em;
    }

    p {
      margin-top: 8px;
      font-size: 14.5px;
      line-height: 1.5;
      color: rgba(79, 110, 247, 0.62);
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 720px;
    }

    a {
      display: inline-block;
      background: #4f6ef7;
      color: #fff;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14.5px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow:
        0 2px 10px rgba(79, 110, 247, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.22) inset;
    }

    a:hover {
      background: #3a58e0;
      box-shadow:
        0 4px 18px rgba(79, 110, 247, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.25) inset;
    }

    a:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="intro">
    <h1>AI Search Glow — Version Comparison</h1>
    <p>Five approaches to the animated glow effect</p>
  </div>
  <div class="links">
    <a href="v1.html">V1 — Card Glow</a>
    <a href="v2.html">V2 — Orbiting Blobs</a>
    <a href="v3.html">V3 — Border Orbit ✦</a>
    <a href="v4.html">V4 — Layered Glow &amp; Rainbow Ring</a>
    <a href="v5.html">V5 — Boundaryless, wide halo</a>
  </div>
</body>
</html>
