<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant Answers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      position: relative;
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 36px 36px;
      max-width: 580px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      overflow: visible;
    }

    /* Rotating conic gradient glow behind the card */
    .card::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: conic-gradient(
        from var(--angle, 0deg),
        #ff6b6b,
        #ff8e53,
        #a855f7,
        #6366f1,
        #3b82f6,
        #a855f7,
        #ff6b6b
      );
      z-index: -1;
      animation: spin 4s linear infinite;
      filter: blur(8px);
      opacity: 0.85;
    }

    /* White inset to keep card clean */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: #ffffff;
      z-index: -1;
    }

    @property --angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes spin {
      to { --angle: 360deg; }
    }

    /* Title row */
    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title-icon {
      color: #1a2e6e;
      font-size: 22px;
      line-height: 1;
    }

    .title-text {
      font-size: 22px;
      font-weight: 700;
      color: #1a2e6e;
    }

    .title-text span {
      color: #c0392b;
    }

    .badge {
      background: #c0392b;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* Input wrapper with its own animated border */
    .input-wrapper {
      position: relative;
      border-radius: 12px;
      padding: 2px;
      background: conic-gradient(
        from var(--angle, 0deg),
        #ff6b6b,
        #a855f7,
        #6366f1,
        #3b82f6,
        #a855f7,
        #ff6b6b
      );
      animation: spin 4s linear infinite;
    }

    .input-inner {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-size: 15px;
      color: #333;
      background: transparent;
      font-family: inherit;
    }

    input[type="text"]::placeholder {
      color: #aaa;
    }

    .ask-btn {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 14px 26px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .ask-btn:hover {
      background: #a93226;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title-row">
      <span class="title-icon">✦</span>
      <span class="title-text">AI Assistant <span>Answers</span></span>
      <span class="badge">NEW!</span>
    </div>
    <p class="subtitle">Get personalized, AI-powered answers built on trusted expertise.</p>

    <div class="input-wrapper">
      <div class="input-inner">
        <input type="text" placeholder="Ask anything to get started..." />
        <button class="ask-btn">ASK</button>
      </div>
    </div>
  </div>
</body>
</html>
